ue{background:rgba(47,111,237,.12);color:var(--accent)}.chip-green{background:rgba(13,148,136,.12);color:var(--success)}.chip-red{background:rgba(220,38,38,.10);color:var(--danger)}.chip-amber{background:rgba(217,119,6,.12);color:var(--warn)}.chip-purple{background:rgba(124,58,237,.12);color:var(--purple)}.chip-neutral{background:var(--surface3);color:var(--dim)}.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:.2s}.modal-backdrop.open{opacity:1;pointer-events:auto}.modal{width:100%;max-width:780px;max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 25px 80px rgba(0,0,0,.35)}.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.modal-head h3{font-size:17px}.modal-body{padding:18px 20px}.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}.x{background:transparent;border:none;color:var(--dim);font-size:24px;cursor:pointer}.toast{position:fixed;right:18px;bottom:18px;z-index:80;display:flex;flex-direction:column;gap:8px}.toast-item{background:var(--surface);border:1px solid var(--border);border-left:5px solid var(--accent);padding:10px 13px;border-radius:12px;box-shadow:var(--shadow);min-width:260px}.toast-item.danger{border-left-color:var(--danger)}.toast-item.success{border-left-color:var(--success)}.toast-item.warn{border-left-color:var(--warn)}.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}.kanban-col{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:10px;min-height:180px}.kanban-title{display:flex;align-items:center;justify-content:space-between;font-weight:800;color:var(--dim);font-size:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}.kanban- /* =========================================================
   v8.4 Scroll / Overflow Fix
   ========================================================= */
html{
  height:100%;
  overflow:hidden;
}
body{
  height:100%;
  overflow:hidden;
}
#loginView.app,
#appView.app{
  height:100dvh;
  min-height:100dvh;
  overflow:hidden;
}
#appView .topbar{
  flex:0 0 58px;
}
#appView .main{
  flex:1 1 auto;
  min-height:0;
  height:calc(100dvh - 58px);
  overflow:hidden;
}
.sidebar{
  min-height:0;
  max-height:calc(100dvh - 58px);
  overflow-y:auto;
  overscroll-behavior:contain;
}
.content{
  min-width:0;
  min-height:0;
  height:100%;
  overflow-y:auto;
  overflow-x:hidden;
  overscroll-behavior:contain;
  padding-bottom:72px;
  scroll-padding-bottom:72px;
}
.panel{
  flex:0 0 auto;
  min-width:0;
}
.panel-body{
  min-width:0;
}
.toolbar{
  position:sticky;
  top:0;
  z-index:3;
  background:var(--surface);
}
.table-wrap{
  width:100%;
  max-height:calc(100dvh - 235px);
  overflow:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
}
.compact-table{
  min-width:980px;
}
.compact-table th{
  top:0;
  z-index:2;
}
.lead-drag-wrap,
.kanban{
  display:flex;
  flex-wrap:nowrap;
  gap:12px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  padding:2px 2px 14px;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
}
.lead-drop-col,
.kanban-col{
  flex:0 0 260px;
  max-width:260px;
  min-width:260px;
  max-height:calc(100dvh - 290px);
  overflow-y:auto;
  overscroll-behavior:contain;
  scroll-snap-align:start;
}
.kanban-col{
  min-height:220px;
}
.lead-col-head,
.kanban-title{
  position:sticky;
  top:0;
  z-index:1;
  background:var(--surface2);
}
.grid{
  min-width:0;
}
.grid > *{
  min-width:0;
}
.modal-backdrop{
  overflow:auto;
  align-items:flex-start;
}
.modal{
  margin:auto 0;
  max-height:calc(100dvh - 32px);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.modal-body{
  min-height:0;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-head,
.modal-foot{
  flex:0 0 auto;
}
.note-list{
  max-height:min(360px, 40dvh);
}
select{
  text-overflow:ellipsis;
}

@media(max-width:900px){#appView .main{flex-direction:column;height:calc(100dvh - 58px);overflow:hidden}.sidebar{width:100%;height:auto;max-height:74px;display:flex;overflow-x:auto;overflow-y:hidden;padding:8px;flex:0 0 auto}.side-section{display:none}.side-item{border-left:0;border-bottom:3px solid transparent;min-width:max-content}.side-item.active{border-bottom-color:var(--accent)}.content{height:auto;flex:1 1 auto;min-height:0;overflow-y:auto;padding:12px 12px 72px}.kpi{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.config{grid-template-columns:1fr}.mobile-only{display:inline}.compact-table td,.compact-table th{padding:7px}.topbar{padding:0 12px}.table-wrap{max-height:calc(100dvh - 270px)}.lead-drop-col,.kanban-col{flex-basis:82vw;min-width:82vw;max-width:82vw;max-height:calc(100dvh - 340px)}}


/* =========================================================
   v8.4 Pretty Overflow UI
   ========================================================= */
:root{
  --scroll-thumb:rgba(104,117,139,.28);
  --scroll-thumb-hover:rgba(47,111,237,.45);
  --scroll-track:transparent;
}
:root[data-theme="dark"]{
  --scroll-thumb:rgba(147,164,184,.24);
  --scroll-thumb-hover:rgba(96,165,250,.42);
  --scroll-track:transparent;
}
.sidebar,
.content,
.table-wrap,
.lead-drag-wrap,
.kanban,
.lead-drop-col,
.kanban-col,
.modal-body,
.note-list{
  scrollbar-width:thin;
  scrollbar-color:var(--scroll-thumb) var(--scroll-track);
}
.sidebar::-webkit-scrollbar,
.content::-webkit-scrollbar,
.table-wrap::-webkit-scrollbar,
.lead-drag-wrap::-webkit-scrollbar,
.kanban::-webkit-scrollbar,
.lead-drop-col::-webkit-scrollbar,
.kanban-col::-webkit-scrollbar,
.modal-body::-webkit-scrollbar,
.note-list::-webkit-scrollbar{
  width:8px;
  height:8px;
}
.sidebar::-webkit-scrollbar-track,
.content::-webkit-scrollbar-track,
.table-wrap::-webkit-scrollbar-track,
.lead-drag-wrap::-webkit-scrollbar-track,
.kanban::-webkit-scrollbar-track,
.lead-drop-col::-webkit-scrollbar-track,
.kanban-col::-webkit-scrollbar-track,
.modal-body::-webkit-scrollbar-track,
.note-list::-webkit-scrollbar-track{
  background:transparent;
}
.sidebar::-webkit-scrollbar-thumb,
.content::-webkit-scrollbar-thumb,
.table-wrap::-webkit-scrollbar-thumb,
.lead-drag-wrap::-webkit-scrollbar-thumb,
.kanban::-webkit-scrollbar-thumb,
.lead-drop-col::-webkit-scrollbar-thumb,
.kanban-col::-webkit-scrollbar-thumb,
.modal-body::-webkit-scrollbar-thumb,
.note-list::-webkit-scrollbar-thumb{
  background:var(--scroll-thumb);
  border-radius:999px;
  border:2px solid transparent;
  background-clip:content-box;
}
.sidebar:hover::-webkit-scrollbar-thumb,
.content:hover::-webkit-scrollbar-thumb,
.table-wrap:hover::-webkit-scrollbar-thumb,
.lead-drag-wrap:hover::-webkit-scrollbar-thumb,
.kanban:hover::-webkit-scrollbar-thumb,
.lead-drop-col:hover::-webkit-scrollbar-thumb,
.kanban-col:hover::-webkit-scrollbar-thumb,
.modal-body:hover::-webkit-scrollbar-thumb,
.note-list:hover::-webkit-scrollbar-thumb{
  background:var(--scroll-thumb-hover);
  border:2px solid transparent;
  background-clip:content-box;
}
.table-wrap,
.lead-drag-wrap,
.kanban{
  border-radius:0 0 var(--radius) var(--radius);
}
.table-wrap{
  background:
    linear-gradient(to right, var(--surface) 0%, rgba(255,255,255,0) 26px) left center / 42px 100% no-repeat,
    linear-gradient(to left, var(--surface) 0%, rgba(255,255,255,0) 26px) right center / 42px 100% no-repeat,
    var(--surface);
}
:root[data-theme="dark"] .table-wrap{
  background:
    linear-gradient(to right, var(--surface) 0%, rgba(22,27,34,0) 26px) left center / 42px 100% no-repeat,
    linear-gradient(to left, var(--surface) 0%, rgba(22,27,34,0) 26px) right center / 42px 100% no-repeat,
    var(--surface);
}
.lead-drag-wrap,
.kanban{
  padding:6px 4px 16px;
  mask-image:linear-gradient(to right, transparent 0, #000 18px, #000 calc(100% - 18px), transparent 100%);
}
.lead-drop-col,
.kanban-col{
  border-color:rgba(184,198,218,.75);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
}
:root[data-theme="dark"] .lead-drop-col,
:root[data-theme="dark"] .kanban-col{
  border-color:rgba(58,74,92,.75);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.lead-col-head,
.kanban-title{
  margin:-10px -10px 8px;
  padding:10px 12px 9px;
  border-radius:16px 16px 0 0;
  backdrop-filter:blur(10px);
}
.toolbar{
  backdrop-filter:blur(14px);
  background:color-mix(in srgb, var(--surface) 88%, transparent);
}
.modal{
  box-shadow:0 28px 90px rgba(0,0,0,.32);
}
.modal-body{
  padding-right:14px;
}
.content{
  scrollbar-gutter:stable;
}
.table-wrap::before{
  content:"↔ 表格可左右滑動";
  position:sticky;
  left:12px;
  display:inline-flex;
  margin:10px 0 0 12px;
  padding:3px 9px;
  border:1px solid var(--border);
  border-radius:999px;
  background:color-mix(in srgb, var(--surface) 92%, transparent);
  color:var(--muted);
  font-size:11px;
  z-index:3;
  pointer-events:none;
}
@supports not (background:color-mix(in srgb, white, transparent)){
  .toolbar,.table-wrap::before{background:var(--surface)}
}
@media(max-width:900px){
  .sidebar::-webkit-scrollbar,
  .lead-drag-wrap::-webkit-scrollbar,
  .kanban::-webkit-scrollbar{
    height:4px;
  }
  .table-wrap::before{
    content:"左右滑動查看更多欄位";
  }
}

// ★ 部署時填入這兩個值，使用者不需要手動輸入任何設定

const CLIENT_ID_DEFAULT  = '391919708501-auf0bg6r9c4bieciim3tbjbu5vqekkjn.apps.googleusercontent.com';       // ← 換成你的 Client ID

const $ = id => document.getElementById(id);
const esc = v => String(v ?? '').replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));
const val = id => ($(id)?.value ?? '').trim();
function setVal(id,v){ const el=$(id); if(el) el.value = v ?? ''; }
function debounce(fn, delay=250){ let timer; return (...args)=>{ clearTimeout(timer); timer=setTimeout(()=>fn(...args), delay); }; }
function normalizeEmail(e){ return String(e||'').trim().toLowerCase(); }
function isManager(){ return currentUser?.role === 'Manager'; }
function visibleLeads(){ return allLeads.filter(l => String(l.IsArchived).toLowerCase() !== 'true' && l.IsArchived !== true); }
function archivedLeads(){ return allLeads.filter(l => String(l.IsArchived).toLowerCase() === 'true' || l.IsArchived === true); }

function toast(msg,type='info'){ const box=$('toast'); const d=document.createElement('div'); d.className='toast-item '+type; d.textContent=msg; box.appendChild(d); setTimeout(()=>d.remove(),4200); }
function normalizeGasUrl(url){ const raw=String(url||'').trim(); if(!raw) throw new Error('尚未設定 GAS Web App URL'); const u=new URL(raw); if(!['script.google.com','script.googleusercontent.com'].includes(u.hostname)) throw new Error('GAS URL 必須是 script.google.com / script.googleusercontent.com'); if(!/\/macros\/s\/[^/]+\/exec$/.test(u.pathname)) throw new Error('請貼部署後 /exec 網址，不是 /dev 或編輯器網址'); u.search=''; u.hash=''; return u.toString(); }
async function apiPost(body={}){ const res = await fetch(normalizeGasUrl(GAS_URL), {method:'POST', cache:'no-store', redirect:'follow', body:JSON.stringify({ authToken: currentAuthToken, ...body }), headers:{'Content-Type':'text/plain;charset=utf-8'}}); const text=await res.text(); let data={}; try{ data=text?JSON.parse(text):{}; }catch(e){ throw new Error('後端沒有回傳 JSON：'+text.slice(0,140)); } if(!res.ok || data.ok===false){
    const err = data.error || `HTTP ${res.status}`;
    if(err.startsWith('UNAUTHENTICATED')) throw new Error('身份驗證失敗：請確認您已登入 Google Workspace 帳號，且 GAS 部署設定允許存取。');
    if(err.startsWith('FORBIDDEN')) throw new Error('存取被拒：您的 Google 帳號尚未登錄於系統 Users Sheet 中，請聯絡管理員。');
    throw new Error(err);
  } return data; }
function applyTheme(theme){ document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('crm_theme', theme); $('themeBtn') && ($('themeBtn').textContent = theme==='dark'?'☀️ 明亮':'🌙 夜色'); }
function toggleTheme(){ applyTheme((localStorage.getItem('crm_theme')||'light')==='dark'?'light':'dark'); }
applyTheme(localStorage.getItem('crm_theme') || 'light');

// ============================================================
//  Google OAuth Login（GIS Token Client 方案）
//  流程：
//  1. login() 初始化 GIS TokenClient（指定 email scope）
//  2. GIS 彈出 Google 帳號選擇視窗，使用者授權後回傳 access_token
//  3. _onGoogleToken() 拿到 token → 呼叫後端 login action 驗證身份
// ============================================================

function login(){
  // GAS_URL & GOOGLE_CLIENT_ID 已寫死在程式碼中，不需要使用者填寫

  const statusEl = $('loginStatus');
  if(statusEl) statusEl.textContent = '正在初始化 Google 登入...';

  try{
    // 初始化 GIS TokenClient（每次 login 重新建立，確保帳號選擇器出現）
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'openid email profile',
      callback: _onGoogleToken,
      error_callback: (err) => {
        const msg = err?.message || err?.type || JSON.stringify(err);
        toast('Google 登入錯誤：' + msg, 'danger');
        if(statusEl) statusEl.textContent = '';
      }
    });
    tokenClient.requestAccessToken({ prompt: 'select_account' });
  }catch(e){
    toast('GIS 初始化失敗：' + e.message + '（請確認 Client ID 正確，且已加入 Authorized JavaScript origins）', 'danger');
    if(statusEl) statusEl.textContent = '';
  }
}

async function _onGoogleToken(tokenResponse){
  const statusEl = $('loginStatus');
  if(tokenResponse.error){
    toast('Google 授權失敗：' + tokenResponse.error, 'danger');
    if(statusEl) statusEl.textContent = '';
    return;
  }
  currentAuthToken = tokenResponse.access_token;
  if(statusEl) statusEl.textContent = '驗證中，請稍候...';
  try{
    const res = await apiPost({action:'login'});
    if(!res.email) throw new Error('後端未回傳使用者 email，請確認此 Google 帳號已登錄於系統 Users Sheet。');
    currentUser = {
      email: normalizeEmail(res.email),
      name: res.name || res.email,
      role: res.role
    };
    localStorage.setItem('crm_user', JSON.stringify(currentUser));
    hydrate(res); showApp(); toast('登入成功','success');
    if(statusEl) statusEl.textContent = '';
    // 在 token 到期前 5 分鐘自動刷新（GIS token 預設有效 1 小時）
    const expiresIn = (Number(tokenResponse.expires_in) || 3600) - 300;
    setTimeout(_refreshToken, Math.max(expiresIn, 60) * 1000);
  }catch(e){
    currentAuthToken = null;
    toast('登入失敗：' + e.message, 'danger');
    if(statusEl) statusEl.textContent = '';
  }
}

function _refreshToken(){
  if(!tokenClient || !currentUser) return;
  // silent refresh：不彈出視窗
  tokenClient.requestAccessToken({ prompt: '' });
}

function hydrate(res){
  allLeads = Array.isArray(res.data)?res.data:[];
  users = Array.isArray(res.users)?res.users:users;
  statuses = Array.isArray(res.statuses)&&res.statuses.length?res.statuses:FALLBACK_STATUSES.slice();
  nationalities = Array.isArray(res.nationalities)&&res.nationalities.length?res.nationalities:FALLBACK_NATIONALITIES.slice();
  purchaseTypes = Array.isArray(res.purchaseTypes)&&res.purchaseTypes.length?res.purchaseTypes:FALLBACK_TYPES.slice();
  $('versionText') && ($('versionText').textContent = res.version || 'v8.6-todo-war-room-next-step');
}

function showApp(){
  $('loginView').classList.add('hidden');
  $('appView').classList.remove('hidden');
  $('userBadge').textContent = `${currentUser.name || currentUser.email}｜${currentUser.role}`;
  // Bug Fix #1：updateCounts 在此時已用 leadListBase()，顯示正確的角色過濾後數量
  updateCounts();
  render();
}

function logout(){ localStorage.removeItem('crm_user'); currentUser=null; currentAuthToken=null; tokenClient=null; $('appView').classList.add('hidden'); $('loginView').classList.remove('hidden'); }

async function reloadAll(){
  try{
    const res=await apiPost({action:'login'});
    hydrate(res); updateCounts(); render();
    lastLeadRefreshAt = new Date();
    toast('完整資料已更新','success');
  }catch(e){ toast('重新整理失敗：'+e.message,'danger'); }
}

async function refreshLeadsOnly({silent=false}={}){
  if(!currentUser?.email || isRefreshingLeads) return;
  isRefreshingLeads = true;
  paintRefreshState(true);
  try{
    let res;
    try{
      res = await apiPost({action:'getleads'});
    }catch(primaryErr){
      res = await apiPost({action:'login'});
    }
    // Bug Fix #3：null vs [] 判斷修正
    // null   = API 沒有回傳 data/leads 欄位，不覆蓋 allLeads（保留現有資料）
    // []     = 合法的空陣列（Sales 無客戶），覆蓋 allLeads
    const nextData = Array.isArray(res.data) ? res.data
                   : Array.isArray(res.leads) ? res.leads
                   : null;
    if(nextData !== null) allLeads = nextData;
    if(Array.isArray(res.users) && res.users.length) users = res.users;
    updateCounts();
    lastLeadRefreshAt = new Date();
    renderAfterLeadMutation();
    if(!silent) toast('客戶資料已刷新','success');
  }catch(e){
    if(!silent) toast('刷新客戶資料失敗：'+e.message,'danger');
  }finally{
    isRefreshingLeads = false;
    paintRefreshState(false);
  }
}

function paintRefreshState(loading=false){
  const el=$('refreshState');
  if(!el) return;
  el.classList.toggle('loading', loading);
  el.textContent = loading ? '同步中...' : (lastLeadRefreshAt ? `最後更新 ${lastLeadRefreshAt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}` : '尚未刷新');
}

function renderAfterLeadMutation(){
  updateCounts();
  if(page==='leads') renderLeads();
  else if(page==='pipeline') renderPipeline();
  else if(page==='todo') renderTodoCenter();
  else render();
  if(activeDrawerLeadId && byId(activeDrawerLeadId)) renderLeadDrawer();
}

// Bug Fix #1：updateCounts 改用 leadListBase()，確保側邊欄數字與清單一致
// 原本用 visibleLeads()（不過濾 Assigned_Sales），導致 Sales 登入時數量顯示全部客戶數
// 但清單用 leadListBase()（有角色過濾），造成「有數字、無清單」的視覺矛盾
function updateCounts(){
  const leads = leadListBase();  // ← 修正：使用角色過濾後的清單
  $('leadCount').textContent = leads.length;
  $('poolCount').textContent = poolLeads().length;
  $('pipelineCount').textContent = leads.length;
  if($('todoCount')) $('todoCount').textContent = todoLeads().length;
}

function showPage(p){ page=p; document.querySelectorAll('.side-item').forEach(i=>i.classList.toggle('active', i.dataset.page===p)); render(); }
function render(){ const map={dashboard:renderDashboard,todo:renderTodoCenter,pipeline:renderPipeline,leads:renderLeads,pool:renderPool,add:renderAdd,quicknote:renderQuickNote,logs:renderLogs,archive:renderArchive,settings:renderSettings}; (map[page]||renderDashboard)(); }
function statusChip(s){ const t=String(s||'待指派'); let c='neutral'; if(['諮詢中','尚未推薦'].includes(t)) c='blue'; if(t==='已成交') c='green'; if(['拒絕加line','首付不足','無效','已透過其他仲介購買'].includes(t)) c='red'; if(['未處理','待指派'].includes(t)) c='amber'; return `<span class="chip chip-${c}">${esc(t)}</span>`; }
function userName(email){ const u=users.find(x=>normalizeEmail(x.email)===normalizeEmail(email)); return u ? `${u.name}｜${u.email}` : (email || '未指派'); }

function todayISO(){ const d=new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); }
function dateOnly(value){ if(!value) return ''; const d=new Date(value); if(Number.isNaN(d.getTime())) return String(value).slice(0,10); return d.toISOString().slice(0,10); }
function daysBetween(dateValue){ if(!dateValue) return null; const d=new Date(dateValue); if(Number.isNaN(d.getTime())) return null; d.setHours(0,0,0,0); const t=new Date(); t.setHours(0,0,0,0); return Math.floor((t-d)/(24*60*60*1000)); }
function nextFollowDate(l){ return l.Next_Follow_Date || l.NextFollowDate || l.nextFollowDate || l.NextFollow_Date || l.Follow_Up_Date || l.Next_Consult_Date || l['下次跟進日'] || ''; }
function lastTouchDate(l){ return l.Last_Consult_Date || l.Updated_At || l.Update_Time || l.Created_At || l['最後跟進日'] || ''; }
function isClosedLead(l){ return ['已成交','無效','已透過其他仲介購買'].includes(String(l.Status_Contact||'')); }
function isDueToday(l){ const n=dateOnly(nextFollowDate(l)); return !isClosedLead(l) && n && n===todayISO(); }
function isOverdueLead(l){ const n=nextFollowDate(l); const d=daysBetween(n); return !isClosedLead(l) && d!==null && d>0; }
function isHotLead(l){ return !isClosedLead(l) && ['諮詢中','尚未推薦','首付不足'].includes(String(l.Status_Contact||'')); }
function todoLeads(){ return leadListBase().filter(l=>isDueToday(l)||isOverdueLead(l)||isStaleLead(l)||isHotLead(l)); }
function todoRank(l){ if(isOverdueLead(l)) return 1; if(isDueToday(l)) return 2; if(isStaleLead(l)) return 3; if(isHotLead(l)) return 4; return 9; }
function todoReason(l){ if(isOverdueLead(l)) return '已逾期跟進'; if(isDueToday(l)) return '今日應跟進'; if(isStaleLead(l)) return '超過 7 天未更新'; if(isHotLead(l)) return '高意向階段'; return '一般待辦'; }
function todoBadge(l){ const r=todoReason(l); const cls = r.includes('逾期') || r.includes('7 天') ? 'danger' : (r.includes('今日') ? 'warn' : 'success'); return `<span class="todo-badge ${cls}">${esc(r)}</span>`; }
function renderCompactLeadRows(items, empty='目前沒有需要處理的客戶'){ return items.length ? items.map(l=>`<div class="war-row" onclick="openLeadDrawer('${esc(l.Lead_ID)}','overview')"><div><b>${esc(l.Name||'未命名')}</b><span>${esc(leadContact(l))}</span></div><div class="war-row-mid">${statusChip(l.Status_Contact)}<small>${esc(userName(l.Assigned_Sales))}</small></div><div class="war-row-actions" onclick="event.stopPropagation()"><button class="btn btn-sm btn-success" onclick="openLeadDrawer('${esc(l.Lead_ID)}','next')">下一步</button><button class="btn btn-sm" onclick="openLeadDrawer('${esc(l.Lead_ID)}','notes')">筆記</button></div></div>`).join('') : `<div class="empty-state"><b>${esc(empty)}</b><span>可以切換篩選條件，或前往客戶管理中心查看完整資料。</span></div>`; }
function salesPerformanceRows(data){ const map={}; data.forEach(l=>{ const key=normalizeEmail(l.Assigned_Sales)||'未指派'; if(!map[key]) map[key]={email:key,name:userName(key),total:0,active:0,closed:0,stale:0,budget:0}; map[key].total++; if(isHotLead(l)) map[key].active++; if(l.Status_Contact==='已成交') map[key].closed++; if(isStaleLead(l)) map[key].stale++; map[key].budget += Number(l.Budget)||0; }); return Object.values(map).sort((a,b)=>b.active-a.active || b.total-a.total); }
function renderSalesBoard(data){ const rows=salesPerformanceRows(data); return rows.length ? rows.map(r=>`<div class="sales-row"><div><b>${esc(r.name)}</b><span>${r.total} 位客戶｜追蹤中 ${r.active}｜成交 ${r.closed}</span></div><div class="sales-row-metrics"><span class="metric-pill warn">逾期 ${r.stale}</span><span class="metric-pill">AED ${r.budget.toLocaleString('en-US')}</span></div></div>`).join('') : '<div class="empty-state"><b>尚無業務資料</b><span>登入後會依 Assigned_Sales 自動彙整。</span></div>'; }
function leadTemperature(l){ if(isClosedLead(l)) return {label:'結案', cls:'neutral'}; if(isOverdueLead(l)||isStaleLead(l)) return {label:'風險', cls:'danger'}; if(isHotLead(l) && (Number(l.Budget)||0)>0) return {label:'高意向', cls:'success'}; if(isHotLead(l)) return {label:'追蹤中', cls:'warn'}; return {label:'一般', cls:'neutral'}; }
function temperaturePill(l){ const t=leadTemperature(l); return `<span class="metric-pill ${t.cls}">${esc(t.label)}</span>`; }

function renderDashboard(){
  const data=leadListBase();
  const today=todoLeads().filter(isDueToday);
  const overdue=todoLeads().filter(isOverdueLead);
  const stale=data.filter(isStaleLead);
  const hot=data.filter(isHotLead);
  const closed=data.filter(l=>l.Status_Contact==='已成交').length;
  const pool=poolLeads().length;
  const totalBudgetValue=totalBudget(data);
  $('content').innerHTML=`<div class="crm-shell">
    <div class="crm-page-head"><div><div class="crm-page-kicker">CRM / Manager Command Room</div><div class="crm-page-title">Manager 戰情室</div><div class="crm-page-sub">從單純數據總覽升級成管理者每日開啟的戰情室：追蹤待辦、業務負載、流程瓶頸與高意向客戶。</div></div><div class="crm-head-actions"><button class="btn btn-primary" onclick="showPage('todo')">查看今日待辦</button><button class="btn btn-ghost" onclick="refreshLeadsOnly()">↻ 只刷新客戶</button></div></div>
    <div class="kpi war-kpi"><div class="kpi-card" onclick="showPage('leads')"><span>有效客戶</span><strong>${data.length}</strong></div><div class="kpi-card" onclick="showPage('todo')"><span>今日待辦</span><strong>${today.length + overdue.length}</strong></div><div class="kpi-card" onclick="showStaleLeads()"><span>逾期 / 久未跟進</span><strong>${overdue.length + stale.length}</strong></div><div class="kpi-card" onclick="filterLeadsByStatus('已成交')"><span>已成交</span><strong>${closed}</strong></div></div>
    <div class="manager-grid">
      <section class="war-card wide"><div class="war-card-head"><div><b>今日優先處理</b><span>逾期、今日到期與高意向客戶</span></div><button class="btn btn-sm btn-primary" onclick="showPage('todo')">進入待辦中心</button></div><div class="war-list">${renderCompactLeadRows([...overdue,...today,...hot].slice(0,8),'今日沒有迫切待辦')}</div></section>
      <section class="war-card"><div class="war-card-head"><div><b>流程瓶頸</b><span>各階段分布與預算</span></div><button class="btn btn-sm" onclick="showPage('pipeline')">流程戰情室</button></div><div class="war-bars">${renderStatusBars(data)}</div></section>
      <section class="war-card"><div class="war-card-head"><div><b>業務負載</b><span>依業務彙整客戶與逾期數</span></div></div><div class="sales-board">${renderSalesBoard(data)}</div></section>
      <section class="war-card"><div class="war-card-head"><div><b>管理摘要</b><span>即時提醒</span></div></div><div class="insight-list">${pipelineInsights(data,stale.slice(0,8),pool).join('')}<div class="insight-item"><div class="insight-icon">$</div><div class="insight-text"><b>目前可追蹤預算 AED ${totalBudgetValue.toLocaleString('en-US')}</b><span>預算欄位有填寫的客戶會納入估算。</span></div></div></div></section>
    </div>

}
function renderStatusBars(data){ const max=Math.max(1,...statuses.map(s=>data.filter(l=>(l.Status_Contact||'待指派')===s).length)); return statuses.map(s=>{ const n=data.filter(l=>(l.Status_Contact||'待指派')===s).length; return `<div style="margin-bottom:10px;cursor:pointer" onclick="showStatusList('${esc(s)}')"><div style="display:flex;justify-content:space-between"><b>${esc(s)}</b><span class="mono muted">${n}</span></div><div style="height:10px;background:var(--surface3);border-radius:999px;overflow:hidden"><div style="height:100%;width:${(n/max)*100}%;background:var(--accent);border-radius:999px"></div></div></div>`; }).join(''); }
function renderDist(data,key){ const obj={}; data.forEach(l=>{ const k=l[key]||'未填'; obj[k]=(obj[k]||0)+1; }); const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]); return entries.length?entries.map(([k,n])=>`<div style="display:flex;justify-content:space-between;padding:9px;border-bottom:1px solid var(--border)"><span>${esc(k)}</span><b class="mono">${n}</b></div>`).join(''):'<div class="no-data">沒有資料</div>'; }
function showStatusList(status){ showPage('leads'); setTimeout(()=>{ const el=$('leadSearch'); if(el){ el.value=status; filterTable(); }},0); }


function renderTodoCenter(){
  const data=todoLeads().sort((a,b)=>todoRank(a)-todoRank(b) || String(nextFollowDate(a)||lastTouchDate(a)||'').localeCompare(String(nextFollowDate(b)||lastTouchDate(b)||'')));
  const overdue=data.filter(isOverdueLead);
  const today=data.filter(isDueToday);
  const stale=data.filter(l=>!isOverdueLead(l)&&!isDueToday(l)&&isStaleLead(l));
  const hot=data.filter(l=>!isOverdueLead(l)&&!isDueToday(l)&&!isStaleLead(l)&&isHotLead(l));
  $('content').innerHTML=`<div class="crm-shell">
    <div class="crm-page-head"><div><div class="crm-page-kicker">CRM / Today Workspace</div><div class="crm-page-title">今日待辦中心</div><div class="crm-page-sub">集中處理今日應跟進、已逾期、超過 7 天未更新與高意向客戶；可直接從右側 Drawer 執行一鍵下一步。</div></div><div class="crm-head-actions"><button class="btn btn-primary" onclick="showPage('leads')">客戶管理中心</button><button class="btn btn-ghost" onclick="refreshLeadsOnly()">↻ 只刷新客戶</button></div></div>
    <div class="quick-status-grid"><div class="quick-status-card"><span>已逾期</span><b>${overdue.length}</b></div><div class="quick-status-card"><span>今日應跟進</span><b>${today.length}</b></div><div class="quick-status-card"><span>久未更新</span><b>${stale.length}</b></div><div class="quick-status-card"><span>高意向</span><b>${hot.length}</b></div></div>
    <div class="todo-board">
      ${renderTodoLane('已逾期跟進',overdue,'danger')}
      ${renderTodoLane('今日應跟進',today,'warn')}
      ${renderTodoLane('超過 7 天未更新',stale,'danger')}
      ${renderTodoLane('高意向客戶',hot,'success')}
    </div>
  </div>`;
}
function renderTodoLane(title,items,type='warn'){
  return `<section class="todo-lane"><div class="todo-lane-head"><div><b>${esc(title)}</b><span>${items.length} 位客戶</span></div><span class="todo-dot ${type}"></span></div><div class="todo-list">${items.length?items.map(renderTodoCard).join(''):'<div class="empty-state"><b>目前沒有資料</b><span>此分類暫時沒有需要處理的客戶。</span></div>'}</div></section>`;
}
function renderTodoCard(l){
  const id=esc(l.Lead_ID); const nf=nextFollowDate(l); const last=lastTouchDate(l);
  return `<div class="todo-card" onclick="openLeadDrawer('${id}','next')"><div class="todo-card-top"><div><b>${esc(l.Name||'未命名')}</b><span>${esc(leadContact(l))}</span></div>${todoBadge(l)}</div><div class="todo-card-meta"><span>${statusChip(l.Status_Contact)}</span>${temperaturePill(l)}<span>👤 ${esc(userName(l.Assigned_Sales))}</span></div><div class="todo-card-note">${esc(l.Note||'尚無追蹤進度')}</div><div class="todo-card-foot"><span>${nf?'下次跟進：'+esc(dateOnly(nf)):(last?'最後更新：'+esc(dateOnly(last)):'尚無日期')}</span><button class="btn btn-sm btn-primary" onclick="event.stopPropagation();openLeadDrawer('${id}','next')">一鍵下一步</button></div></div>`;
}

function renderPipeline(){
  const data=leadListBase();
  const stageRows = pipelineStageRows(data);
  const total = data.length;
  const closed = data.filter(l=>l.Status_Contact==='已成交').length;
  const active = data.filter(l=>['未處理','諮詢中','尚未推薦','首付不足'].includes(l.Status_Contact||'')).length;
  const noOwner = data.filter(l=>!String(l.Assigned_Sales||'').trim()).length;
  const stale = data.filter(isStaleLead).slice(0,8);
  const max = Math.max(1,...stageRows.map(x=>x.count));
  $('content').innerHTML=`<div class="crm-shell">
    <div class="crm-page-head"><div><div class="crm-page-kicker">CRM / Process Command Center</div><div class="crm-page-title">流程戰情室</div><div class="crm-page-sub">把原本容易混淆的 Sales Pipeline 改成管理層可用的流程總覽：看各階段數量、預算、瓶頸與需要追蹤的客戶。</div></div><div class="crm-head-actions"><button class="btn btn-primary" onclick="showPage('leads')">前往客戶管理中心</button><button class="btn btn-ghost" onclick="refreshLeadsOnly()">↻ 只刷新客戶</button></div></div>
    <div class="quick-status-grid"><div class="quick-status-card" onclick="showPage('leads')"><span>有效客戶</span><b>${total}</b></div><div class="quick-status-card" onclick="filterLeadsByStatus('已成交')"><span>已成交</span><b>${closed}</b></div><div class="quick-status-card" onclick="showPage('leads')"><span>追蹤中</span><b>${active}</b></div><div class="quick-status-card" onclick="filterUnassignedLeads()"><span>待指派</span><b>${noOwner}</b></div></div>
    <div class="pipeline-shell">
      <section class="pipeline-card"><div class="pipeline-card-head"><div class="pipeline-card-title">階段轉換概況</div><span class="muted">點擊階段可回到客戶清單篩選</span></div><div class="pipeline-card-body">${stageRows.map(r=>`<div class="stage-row" onclick="filterLeadsByStatus('${esc(r.status)}')"><div class="stage-name">${esc(r.status)}</div><div class="stage-bar"><div class="stage-fill" style="width:${Math.round((r.count/max)*100)}%"></div></div><div class="stage-num">${r.count}</div><div class="stage-money">${r.total?`AED ${r.total.toLocaleString('en-US')}`:'—'}</div></div>`).join('')}</div></section>
      <section class="pipeline-card"><div class="pipeline-card-head"><div class="pipeline-card-title">需要優先處理</div><span class="muted">依狀態與最後跟進判斷</span></div><div class="pipeline-card-body"><div class="insight-list">${pipelineInsights(data,stale,noOwner).join('')}</div></div></section>
    </div>
  </div>`;
}
function pipelineStageRows(data){ return statuses.map(status=>{ const items=data.filter(l=>(l.Status_Contact||'待指派')===status); return {status,count:items.length,total:totalBudget(items)}; }); }
function isStaleLead(l){ const s=String(l.Status_Contact||''); if(['已成交','無效','已透過其他仲介購買'].includes(s)) return false; const raw = l.Last_Consult_Date || l.Updated_At || l.Update_Time || l.Created_At || ''; if(!raw) return true; const t = new Date(raw).getTime(); if(Number.isNaN(t)) return false; return Date.now() - t > 7*24*60*60*1000; }
function pipelineInsights(data,stale,noOwner){
  const items=[];
  if(noOwner>0) items.push(`<div class="insight-item" onclick="filterUnassignedLeads()"><div class="insight-icon">!</div><div class="insight-text"><b>${noOwner} 位客戶尚未指派</b><span>建議先分配業務，避免 Lead Pool 累積。</span></div></div>`);
  if(stale.length>0) items.push(`<div class="insight-item" onclick="showStaleLeads()"><div class="insight-icon">7</div><div class="insight-text"><b>${stale.length} 位客戶可能超過 7 天未跟進</b><span>點擊查看需要補追蹤的客戶。</span></div></div>`);
  const hot = data.filter(l=>['諮詢中','尚未推薦'].includes(l.Status_Contact||'')).length;
  items.push(`<div class="insight-item" onclick="filterLeadsByStatus('諮詢中')"><div class="insight-icon">↗</div><div class="insight-text"><b>${hot} 位客戶在高意向階段</b><span>可優先檢查是否需要推薦物件或安排下一步。</span></div></div>`);
  if(!items.length) items.push('<div class="archive-hint">目前沒有明顯瓶頸。</div>');
  return items;
}
function filterLeadsByStatus(status){ showPage('leads'); setTimeout(()=>{ leadStatusFilter=status; leadPage=1; renderLeads(); },0); }
function filterUnassignedLeads(){ showPage('pool'); }
function showStaleLeads(){ showPage('leads'); setTimeout(()=>{ leadSearchQuery=''; leadStatusFilter=''; leadPage=1; renderLeads(isStaleLead); },0); }

function leadInitial(l){ return esc((l.Name||'?').trim().slice(0,1).toUpperCase()); }
function leadBudget(l){ const b=String(l.Budget||'').trim(); return b ? `AED ${Number(b).toLocaleString('en-US')}` : '未填預算'; }
function leadContact(l){ return l.Phone || l.LINE || l.Email || '無聯絡資訊'; }
function totalBudget(items){ return items.reduce((sum,l)=>sum+(Number(l.Budget)||0),0); }
function tableRows(data, opts={}){ return data.map(l=>`<tr data-row>${selectedColumns().map(c=>renderLeadTd(l,c,opts)).join('')}</tr>`).join(''); }
function selectedColumns(){ return LEAD_COLUMNS.filter(c=>c.fixed || visibleLeadColumns.includes(c.key)); }
function renderLeadTd(l,c,opts={}){ const id=esc(l.Lead_ID); const map={
  name:`<td class="col-name"><div class="lead-main-cell" onclick="openLeadDrawer('${id}','overview')"><div class="lead-avatar">${leadInitial(l)}</div><div class="lead-name-block"><b>${esc(l.Name||'未命名')}</b><small>${esc(l.Email||l.Lead_ID||'')}</small></div></div></td>`,
  status:`<td class="col-status">${statusChip(l.Status_Contact)}</td>`,
  phone:`<td class="col-phone">${esc(l.Phone||'')}</td>`,
  line:`<td class="col-line">${esc(l.LINE||'')}</td>`,
  nationality:`<td class="col-nationality">${esc(l.Status_Region||'')}</td>`,
  type:`<td class="col-type">${esc(l.Type||'')}</td>`,
  budget:`<td class="col-budget mono">${l.Budget?esc(leadBudget(l)):''}</td>`,
  sales:`<td class="col-sales">${esc(userName(l.Assigned_Sales))}</td>`,
  note:`<td class="col-note note-cell" title="${esc(l.Note||'')}">${esc(l.Note||'')}</td>`,
  actions:`<td class="col-actions"><div class="actions"><button class="btn btn-sm" onclick="openLeadDrawer('${id}','edit')">✏️</button><button class="btn btn-sm btn-success" title="快速新增跟進紀錄" onclick="openLeadDrawer('${id}','notes')">📒</button>${opts.archive?`<button class="btn btn-sm btn-success" onclick="restoreLead('${id}')">還原</button>`:`<button class="btn btn-sm btn-danger" onclick="archiveLead('${id}')">封存</button>`}</div></td>`
}; return map[c.key] || '<td></td>'; }

// leadListBase：所有需要「依角色過濾」的清單/統計都必須通過這裡
// Manager 看所有未封存客戶；Sales 只看自己 Assigned_Sales 的未封存客戶
function leadListBase(){
  return visibleLeads().filter(l =>
    isManager() || normalizeEmail(l.Assigned_Sales) === currentUser.email
  );
}

function applyLeadFilters(extraPredicate=null){
  const q=String(leadSearchQuery||'').toLowerCase();
  const sf=leadStatusFilter;
  let data=leadListBase();
  if(sf) data=data.filter(l=>(l.Status_Contact||'待指派')===sf);
  if(q) data=data.filter(l=>JSON.stringify(l).toLowerCase().includes(q));
  if(typeof extraPredicate==='function') data=data.filter(extraPredicate);
  return data;
}
const debouncedLeadSearch = debounce(()=>{ leadPage=1; localStorage.setItem('crm_lead_page', String(leadPage)); filterTable(); }, 260);
function onLeadSearchInput(el){ leadSearchQuery=el.value; debouncedLeadSearch(); }
function onLeadStatusChange(el){ leadStatusFilter=el.value; leadPage=1; localStorage.setItem('crm_lead_page', String(leadPage)); filterTable(); }

function renderLeadViewTabs(){ const tabs=[['kanban','狀態看板','拖曳推進'],['list','客戶清單','分頁管理'],['activity','跟進動態','紀錄時間軸']]; return `<div class="view-switcher">${tabs.map(([k,t,h])=>`<button class="view-tab ${leadViewMode===k?'active':''}" onclick="setLeadViewMode('${k}')">${t}<span class="tab-hint">${h}</span></button>`).join('')}</div>`; }
function setLeadViewMode(mode){ leadViewMode=mode; leadPage=1; localStorage.setItem('crm_lead_view_mode', mode); localStorage.setItem('crm_lead_page', String(leadPage)); renderLeads(); }
function renderLeadDragBoard(data){ return `<div class="bitrix-kanban-wrap"><div class="bitrix-kanban">${statuses.map(s=>{ const items=data.filter(l=>(l.Status_Contact||'待指派')===s); const total=totalBudget(items); return `<div class="bitrix-col lead-drop-col" data-status="${esc(s)}" ondragover="allowLeadDrop(event)" ondragleave="leadDragLeave(event)" ondrop="dropLeadStatus(event,'${esc(s)}')"><div class="bitrix-col-head"><div><div class="bitrix-col-title">${esc(s)}</div><div class="bitrix-col-meta">${items.length} leads</div></div><div class="bitrix-col-total">${total?`AED ${total.toLocaleString('en-US')}`:'—'}</div></div><div class="bitrix-col-body">${items.map(l=>leadDragCard(l)).join('') || '<div class="bitrix-empty">拖曳客戶到這裡</div>'}</div></div>`; }).join('')}</div></div>`; }
function leadDragCard(l){ const id=esc(l.Lead_ID); return `<div class="bitrix-card" draggable="true" data-lead-id="${id}" ondragstart="leadDragStart(event,'${id}')" ondragend="leadDragEnd(event)" onclick="openLeadDrawer('${id}','overview')"><div class="bitrix-card-top"><div><div class="bitrix-name">${esc(l.Name||'未命名')}</div><div class="muted">${esc(leadContact(l))}</div></div>${statusChip(l.Status_Contact)}</div><div class="bitrix-budget">${esc(leadBudget(l))}</div><div class="bitrix-meta"><span>👤 ${esc(userName(l.Assigned_Sales)||'未指派')}</span><span>🏠 ${esc(l.Type||'未填類型')}　🌐 ${esc(l.Status_Region||'未填國籍')}</span>${l.Note?`<span title="${esc(l.Note)}">📝 ${esc(l.Note).slice(0,46)}</span>`:''}</div><div class="bitrix-card-actions" onclick="event.stopPropagation()"><button class="btn btn-sm" onclick="openLeadDrawer('${id}','edit')">✏️ 編輯</button><button class="btn btn-sm btn-success" onclick="openLeadDrawer('${id}','notes')">📒 跟進</button></div></div>`; }

function renderLeads(extraPredicate=null){
  const data=applyLeadFilters(extraPredicate);
  $('content').innerHTML=`<div class="crm-shell"><div class="crm-page-head"><div><div class="crm-page-kicker">CRM / Customer Workspace</div><div class="crm-page-title">客戶管理中心</div><div class="crm-page-sub">狀態看板 / 客戶清單 / 跟進動態分流；搜尋採 debounce，清單採分頁，客戶細節統一由右側 Drawer 管理。</div></div><div class="crm-head-actions"><span class="refresh-badge" id="refreshState">${lastLeadRefreshAt ? `最後更新 ${lastLeadRefreshAt.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}` : '尚未刷新'}</span><button class="btn btn-primary" onclick="showPage('add')">＋ 新增客戶</button><button class="btn btn-success" onclick="showPage('quicknote')">📒 快速跟進</button><button class="btn btn-ghost" onclick="refreshLeadsOnly()">↻ 只刷新客戶</button></div></div><div class="crm-toolbar">${renderLeadViewTabs()}<input class="crm-search" id="leadSearch" placeholder="搜尋姓名、電話、LINE、狀態、國籍、業務..." value="${esc(leadSearchQuery)}" oninput="onLeadSearchInput(this)"><select id="statusFilter" class="crm-select" onchange="onLeadStatusChange(this)"><option value="">全部狀態</option>${statuses.map(s=>`<option ${leadStatusFilter===s?'selected':''}>${esc(s)}</option>`).join('')}</select>${leadViewMode==='list'?renderColumnPicker():''}</div><div class="crm-content-card"><div class="crm-content-inner" id="leadMainView">${renderLeadMainView(data)}</div></div></div>`;
  paintRefreshState(false);
}

function renderLeadMainView(data){ if(leadViewMode==='list') return renderLeadTable(data); if(leadViewMode==='activity') return renderLeadActivity(data); return renderLeadDragBoard(data); }

function renderLeadTable(data){
  const cols=selectedColumns();
  const total=data.length;
  const totalPages=Math.max(1, Math.ceil(total / leadPageSize));
  if(leadPage>totalPages) leadPage=totalPages;
  const start=(leadPage-1)*leadPageSize;
  const pageData=data.slice(start,start+leadPageSize);
  return `<div class="list-shell"><div class="list-footer"><div>目前篩選 <span class="list-count">${total}</span> 筆；顯示第 <span class="list-count">${total?start+1:0}-${Math.min(start+leadPageSize,total)}</span> 筆。右側操作欄固定可見。</div><div class="pager"><span>每頁</span><select class="page-size" onchange="setLeadPageSize(this.value)"><option ${leadPageSize===10?'selected':''}>10</option><option ${leadPageSize===25?'selected':''}>25</option><option ${leadPageSize===50?'selected':''}>50</option><option ${leadPageSize===100?'selected':''}>100</option></select><button class="btn btn-ghost btn-sm" onclick="setLeadPage(1)" ${leadPage<=1?'disabled':''}>«</button><button class="btn btn-ghost btn-sm" onclick="setLeadPage(${leadPage-1})" ${leadPage<=1?'disabled':''}>上一頁</button><span class="mono">${leadPage} / ${totalPages}</span><button class="btn btn-ghost btn-sm" onclick="setLeadPage(${leadPage+1})" ${leadPage>=totalPages?'disabled':''}>下一頁</button><button class="btn btn-ghost btn-sm" onclick="setLeadPage(${totalPages})" ${leadPage>=totalPages?'disabled':''}>»</button></div></div><div class="bitrix-table-wrap"><table class="bitrix-table"><colgroup>${cols.map(c=>`<col class="col-${esc(c.key)}" style="width:${leadColWidth(c.key)}">`).join('')}</colgroup><thead><tr>${cols.map(c=>`<th class="col-${esc(c.key)}">${esc(c.label)}</th>`).join('')}</tr></thead><tbody id="leadTbody">${tableRows(pageData)||`<tr><td colspan="${cols.length}" class="no-data">沒有客戶資料</td></tr>`}</tbody></table></div></div>`;
}
function setLeadPage(pageNo){
  leadPage=Math.max(1, Number(pageNo)||1);
  localStorage.setItem('crm_lead_page', String(leadPage));
  filterTable();
}
function setLeadPageSize(size){
  leadPageSize=Number(size)||25;
  leadPage=1;
  localStorage.setItem('crm_lead_page_size', String(leadPageSize));
  localStorage.setItem('crm_lead_page', String(leadPage));
  filterTable();
}

function renderLeadActivity(data){ const items=data.slice().sort((a,b)=>String(b.Last_Consult_Date||b.Updated_At||'').localeCompare(String(a.Last_Consult_Date||a.Updated_At||''))).slice(0,80); return `<div class="activity-feed">${items.map(l=>`<div class="activity-card" onclick="openLeadDrawer('${esc(l.Lead_ID)}','notes')"><div><b>${esc(l.Name||'未命名')}</b><div class="muted">${esc(l.Note||'尚無追蹤進度')}</div></div><div style="text-align:right">${statusChip(l.Status_Contact)}<div class="muted">${esc(l.Last_Consult_Date||'未填日期')}</div></div></div>`).join('') || '<div class="no-data">沒有活動資料</div>'}</div>`; }
function renderColumnPicker(){ return `<div class="column-popover"><button class="btn btn-ghost" onclick="toggleColumnMenu(event)">欄位設定</button><div class="column-menu" id="columnMenu">${LEAD_COLUMNS.filter(c=>!c.fixed).map(c=>`<label><input type="checkbox" ${visibleLeadColumns.includes(c.key)?'checked':''} onchange="toggleLeadColumn('${c.key}',this.checked)">${esc(c.label)}</label>`).join('')}</div></div>`; }
function toggleColumnMenu(ev){ ev.stopPropagation(); $('columnMenu')?.classList.toggle('open'); }
function toggleLeadColumn(key,checked){ if(checked && !visibleLeadColumns.includes(key)) visibleLeadColumns.push(key); if(!checked) visibleLeadColumns=visibleLeadColumns.filter(k=>k!==key); localStorage.setItem('crm_visible_lead_columns', JSON.stringify(visibleLeadColumns)); const data=applyLeadFilters(); $('leadMainView').innerHTML=renderLeadTable(data); }
function filterTable(){ const data=applyLeadFilters(); if($('leadMainView')) $('leadMainView').innerHTML=renderLeadMainView(data); }
document.addEventListener('click',e=>{ if(!e.target.closest?.('.column-popover')) $('columnMenu')?.classList.remove('open'); });
function leadDragStart(ev, leadId){ ev.dataTransfer.setData('text/plain', leadId); ev.dataTransfer.effectAllowed='move'; ev.currentTarget.classList.add('dragging'); }
function leadDragEnd(ev){ ev.currentTarget.classList.remove('dragging'); document.querySelectorAll('.lead-drop-col.drag-over').forEach(el=>el.classList.remove('drag-over')); }
function allowLeadDrop(ev){ ev.preventDefault(); ev.dataTransfer.dropEffect='move'; ev.currentTarget.classList.add('drag-over'); }
function leadDragLeave(ev){ if(!ev.currentTarget.contains(ev.relatedTarget)) ev.currentTarget.classList.remove('drag-over'); }
async function dropLeadStatus(ev, newStatus){ ev.preventDefault(); ev.currentTarget.classList.remove('drag-over'); const leadId=ev.dataTransfer.getData('text/plain'); if(!leadId) return; await moveLeadStatus(leadId,newStatus); }

// movestatus 已在 GAS 後端實作
// 前端樂觀更新（先更新畫面）→ 再向後端發送 movestatus，失敗時回滾
async function moveLeadStatus(leadId,newStatus){
  const lead=byId(leadId);
  if(!lead) return toast('找不到客戶資料','danger');
  // 前端防呆：空值或未定義直接攔截，避免後端收到空 status
  if(!newStatus || !newStatus.trim()) return toast('拖曳目標狀態無效','warn');
  const oldStatus=lead.Status_Contact||'未處理';
  if(oldStatus===newStatus) return;
  // 樂觀更新
  lead.Status_Contact=newStatus;
  lead.Last_Consult_Date=new Date().toISOString().slice(0,10);
  filterTable();
  updateCounts();
  try{
    await apiPost({action:'movestatus', Lead_ID:leadId, newStatus});
    toast(`已將 ${lead.Name||leadId} 從「${oldStatus}」移到「${newStatus}」`,'success');
  }catch(e){
    // 失敗回滾
    lead.Status_Contact=oldStatus;
    filterTable();
    updateCounts();
    toast('拖曳更新失敗：'+e.message,'danger');
  }
}

function addDaysISO(days){ const d=new Date(); d.setDate(d.getDate()+(Number(days)||0)); return d.toISOString().slice(0,10); }
async function runNextStep(id,{content,type='一般跟進',status='',nextDate=''}){
  const l=byId(id); if(!l) return toast('找不到客戶資料','danger');
  const oldStatus=l.Status_Contact||'待指派';
  const finalDate=nextDate || todayISO();
  try{
    if(status && status!==oldStatus){ await apiPost({action:'movestatus', Lead_ID:id, newStatus:status}); l.Status_Contact=status; }
    await apiPost({action:'addnote', Lead_ID:id, customerName:l.Name||'', content, type, nextFollowDate:finalDate, important:type==='重要'});
    l.Note=content;
    l.Last_Consult_Date=todayISO();
    l.Next_Follow_Date=finalDate;
    notesCache.delete(id);
    toast('下一步已完成','success');
    renderAfterLeadMutation();
    activeDrawerTab='overview';
    renderLeadDrawer();
  }catch(e){ l.Status_Contact=oldStatus; toast('一鍵下一步失敗：'+e.message,'danger'); renderAfterLeadMutation(); }
}
function quickNextStep(id,key){ const a=NEXT_ACTIONS.find(x=>x.key===key); if(!a) return; runNextStep(id,{content:a.content,type:a.type,status:a.status,nextDate:addDaysISO(a.days)}); }
function quickCustomNextStep(id){ const content=val('customNextContent'); if(!content) return toast('請輸入自訂下一步內容','warn'); runNextStep(id,{content,type:'一般跟進',status:val('customNextStatus'),nextDate:val('customNextDate')||todayISO()}); }

async function loadNotes(id,force=false){
  const cached=notesCache.get(id);
  if(!force && cached && Date.now()-cached.fetchedAt < 5*60*1000) return paintNotes(cached.data);
  if($('noteHistory')) $('noteHistory').innerHTML='<div class="note-loading">正在讀取跟進紀錄...</div>';
  try{
    const res=await apiPost({action:'getnotes', Lead_ID:id, leadId:id, limit:50});
    const notes=res.notes||res.data||[];
    notesCache.set(id,{data:notes,fetchedAt:Date.now()});
    paintNotes(notes);
  }catch(e){ if($('noteHistory')) $('noteHistory').innerHTML=`<div class="no-data">讀取失敗：${esc(e.message)}</div>`; }
}

function renderArchive(){ const data=archivedLeads(); $('content').innerHTML=`<section class="panel"><div class="panel-head"><div class="panel-title">🗄️ 封存檔案庫</div></div><div class="table-wrap"><table class="compact-table"><thead><tr><th>姓名</th><th>電話</th><th>LINE</th><th>聯繫狀況</th><th>國籍</th><th>購買類型</th><th>預算/AED</th><th>業務</th><th>追蹤進度</th><th>操作</th></tr></thead><tbody>${tableRows(data,{archive:true})||'<tr><td colspan="10" class="no-data">沒有封存資料</td></tr>'}</tbody></table></div></section>`; }
async function renderLogs(){ $('content').innerHTML=`<section class="panel"><div class="panel-head"><div class="panel-title">🧾 操作日誌</div><button class="btn btn-primary btn-sm" onclick="fetchLogs()">讀取日誌</button></div><div class="table-wrap"><table class="compact-table"><thead><tr><th>時間</th><th>操作者</th><th>操作內容</th><th>客戶</th><th>Lead ID</th></tr></thead><tbody id="logTbody"><tr><td colspan="5" class="no-data">點擊讀取日誌</td></tr></tbody></table></div></section>`; }
async function fetchLogs(){ try{ const res=await apiPost({action:'getlogs', limit:200}); const arr=res.logs||res.data||[]; $('logTbody').innerHTML = arr.map(r=>`<tr><td>${esc(r['時間戳']||r.time||r.ts)}</td><td>${esc(r['操作者']||r.actor||r.User_Email)}</td><td>${esc(r['操作內容']||r.action)}</td><td>${esc(r['客戶名稱']||r.customerName)}</td><td>${esc(r.Lead_ID||r.leadId)}</td></tr>`).join('') || '<tr><td colspan="5" class="no-data">沒有日誌</td></tr>'; }catch(e){ toast('讀取日誌失敗：'+e.message,'danger'); } }
function renderSettings(){ $('content').innerHTML=`<section class="panel"><div class="panel-head"><div class="panel-title">⚙️ 系統資訊</div></div><div class="panel-body"><div class="config"><div><label>目前登入帳號</label><input readonly value="${esc(currentUser?.email||'')}"></div><div><label>角色</label><input readonly value="${esc(currentUser?.role||'')}"></div><div><label>GAS Web App URL</label><input readonly value="${esc(GAS_URL)}"></div></div><div class="help">🔐 此系統使用 Google Workspace OAuth 驗證。如需修改系統設定，請聯絡管理員直接修改程式碼部署。</div></div></section>`; }
function saveSettings(){ toast('設定為唯讀，如需修改請聯絡管理員。','warn'); }
function openModal(title,body,foot){ $('modalTitle').textContent=title; $('modalBody').innerHTML=body; $('modalFoot').innerHTML=foot; $('modalBackdrop').classList.add('open'); }
function closeModal(){ $('modalBackdrop').classList.remove('open'); editingLeadId=null; }
window.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeLeadDrawer(); } });
(function boot(){
  // GAS_URL & GOOGLE_CLIENT_ID 已寫死，不需要 setVal
  // Workspace Auth: access_token 不持久化，每次開啟頁面必須重新 OAuth 授權
})();
</script>
</body>
</html>
